<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Epistemologia - Impatech (Pré-Projeto)</title>
    
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <aside class="sidebar">
        <h1>Epistemologia da Ciência</h1>
        <p>Explore as definições de ciência propostas por filósofos e como eles a demarcam.</p>
        <div class="timeline-container">
            <h3>Linha do Tempo: <span id="ano-display">1990</span></h3>
            <input type="range" id="slider-tempo" min="1900" max="1990" step="1" value="1990">
            <div class="timeline-labels">
                <span>1900</span>
                <span>1990</span>
            </div>
        </div>
        <div class="filter-container">
        <h3>Filtrar por Filósofo</h3>
            <select id="filtro-filosofo">
                <option value="todos">Todos os Filósofos</option>
                <option value="1">Karl Popper</option>
                <option value="2">Imre Lakatos</option>
                <option value="6">Thomas Kuhn</option>
                <option value="7">Paul Feyerabend</option>
                <option value="8">Carl Hempel</option>
            </select>
        </div>
        <div class="legend">
            <h3>Arestas</h3>
            <div class="legend-item">
                <div class="color-box color-science"></div>
                <span>Considerado Ciência por</span>
            </div>
            <div class="legend-item">
                <div class="color-box color-pseudo"></div>
                <span>Considerado Pseudociência por</span>
            </div>
            <div class="legend-item">
                <div class="color-box color-dialogue" style="width: 20px;"></div>
                <span>Diálogo entre Autores</span>
            </div>
        </div>
    </aside>

    <main class="graph-container">
        <div id="mynetwork"></div>
        <button id="btn-recentralizar" title="Centralizar visualização">Recentralizar</button>
    </main>

    <script type="text/javascript">
        // Função para formatar o HTML dos tooltips
        function htmlTitle(textoHTML) {
            var container = document.createElement("div");
            container.innerHTML = textoHTML;
            return container;
        }

        var container = document.getElementById('mynetwork');
        
        // Opções visuais do Grafo
        // var options = {
        //     nodes: {
        //         shape: 'dot',
        //         size: 25,
        //         font: { size: 16, face: 'Inter', color: '#333' },
        //         borderWidth: 2
        //     },
        //     groups: {
        //         filosofo: {
        //             size: 40,
        //             color: { 
        //                 border: '#1a1a1a', 
        //                 background: '#ffffff'
        //             },
        //             font: { color: '#1a1a1a', face: 'Inter', size: 14, bold: true },
        //             borderWidth: 4,
        //             shadow: { enabled: true, color: 'rgba(0,0,0,0.2)', size: 10, x: 2, y: 2 }
        //         },
        //         campo: {
        //             color: { background: '#f0f0f0', border: '#d3d3d3' },
        //             font: { color: '#333', face: 'Inter' },
        //             shadow: { enabled: true, color: 'rgba(0,0,0,0.1)', size: 5, x: 2, y: 2 }
        //         }
        //     },
        //     interaction: {
        //         hover: true,
        //         tooltipDelay: 50
        //     },
        //     physics: {
        //         solver: 'forceAtlas2Based',
        //         forceAtlas2Based: { gravitationalConstant: -80, springLength: 250 }
        //     }
        // };
        
        var options = {
        
            nodes: {
                shape: 'dot',
                size: 30,
                font: { 
                    size: 14, 
                    face: 'Inter', 
                    color: '#1a1a1a',
                    background: 'rgba(255, 255, 255, 0.8)', 
                    strokeWidth: 2,
                    strokeColor: '#ffffff'
                },
                borderWidth: 3,
                shadow: { enabled: true, color: 'rgba(0,0,0,0.15)', size: 10, x: 3, y: 3 }
            },

            
            edges: {
                width: 2,
                smooth: {
                    type: 'continuous',
                    roundness: 0.6
                },
                shadow: { enabled: true, color: 'rgba(0,0,0,0.05)', size: 3, x: 1, y: 1 }
            },

          
            physics: {
                solver: 'forceAtlas2Based',
                forceAtlas2Based: { 
                    gravitationalConstant: -150,    // Afasta mais os nós uns dos outros (desaninha)
                    centralGravity: 0.01,           // Mantém o grafo centrado suavemente
                    springLength: 300,              // Aumenta o tamanho das linhas (dá "respiro" visual)
                    springConstant: 0.04            // Deixa a atração menos agressiva
                },
                stabilization: {
                    enabled: true,
                    iterations: 200, // O grafo "pensa" na posição ideal invisivelmente antes de aparecer, evitando pular na tela
                    fit: true
                }
            },

            interaction: {
                hover: true,
                tooltipDelay: 100,
                zoomView: true
            }
        };
        
        fetch('data.json')
            .then(response => response.json()) 
            .then(dados => {

                // 1. Prepara os Nós e Arestas
                let processedNodes = dados.nodes.map(node => {
                    if (node.title) node.title = htmlTitle(node.title);
                    return node;
                });
            
                let processedEdges = dados.edges.map(edge => {
                    if (edge.title) edge.title = htmlTitle(edge.title);
                    return edge;
                });
         
                var nodes = new vis.DataSet(processedNodes);
                var edges = new vis.DataSet(processedEdges);
                var data = { nodes: nodes, edges: edges };
            
                var network = new vis.Network(container, data, options);


                // Botão de Recentralizar
                document.getElementById('btn-recentralizar').addEventListener('click', function() {
                     network.fit({
                         animation: {
                             duration: 800, // Aumentei um pouco a duração para ficar mais suave
                             easingFunction: 'easeInOutQuad' 
                         }
                     });
                });

                // Efeito Holofote (Selecionar Nó)
                network.on("selectNode", function (params) {
                    var selectedNodeId = params.nodes[0];
                    var connectedNodes = network.getConnectedNodes(selectedNodeId); 
                    connectedNodes.push(selectedNodeId); 
                 
                    var nodesToUpdate = [];
                    nodes.forEach(function(node) {
                        if (connectedNodes.includes(node.id)) {
                            nodesToUpdate.push({ id: node.id, opacity: 1 });
                        } else {
                            nodesToUpdate.push({ id: node.id, opacity: 0.15 });
                        }
                    });
                    nodes.update(nodesToUpdate);
                
                    var edgesToUpdate = [];
                    edges.forEach(function(edge) {
                        if (edge.from === selectedNodeId || edge.to === selectedNodeId) {
                            edgesToUpdate.push({ id: edge.id, opacity: 1 });
                        } else {
                            edgesToUpdate.push({ id: edge.id, opacity: 0.05 });
                        }
                    });
                    edges.update(edgesToUpdate);
        
                    network.focus(selectedNodeId, {
                        scale: 1.3,
                        animation: { 
                            duration: 500,
                            easingFunction: 'easeInOutQuad' 
                        }
                    });
                });

                // Clicar "no vazio" (Deselecionar)
                network.on("deselectNode", function (params) {
                    var nodesToUpdate = [];
                    nodes.forEach(function(node) {
                        nodesToUpdate.push({ id: node.id, opacity: 1 });
                    });
                    nodes.update(nodesToUpdate);

                    var edgesToUpdate = [];
                    edges.forEach(function(edge) {
                        edgesToUpdate.push({ id: edge.id, opacity: 1 });
                    });
                    edges.update(edgesToUpdate);
                });


                var slider = document.getElementById('slider-tempo');
                var displayAno = document.getElementById('ano-display');

                slider.addEventListener('input', function() {
                    var anoSelecionado = parseInt(this.value);
                    displayAno.innerText = anoSelecionado; // Atualiza o texto visualmente
                
                    var nodesToUpdate = [];

                    // Percorre todos os nós que vieram do JSON
                    dados.nodes.forEach(function(nodeData) {
                        // Se o ano de publicação do filósofo for maior que o ano no slider, esconde-o!
                        if (nodeData.ano > anoSelecionado) {
                            nodesToUpdate.push({ id: nodeData.id, hidden: true });
                        } else {
                            nodesToUpdate.push({ id: nodeData.id, hidden: false });
                        }
                    });
                
                    // Atualiza o grafo
                    nodes.update(nodesToUpdate);
                });
                
                
                
            
                var selectFilosofo = document.getElementById('filtro-filosofo');

                selectFilosofo.addEventListener('change', function() {
                    var idEscolhido = this.value;
                
                    // Garantir que todos os nós estão visíveis, já que mudámos a abordagem
                    var todosVisiveis = dados.nodes.map(n => ({ id: n.id, hidden: false }));
                    nodes.update(todosVisiveis);
                
                    if (idEscolhido === 'todos') {
                        // Se escolher "Todos", a câmara afasta-se para mostrar o grafo inteiro
                        network.fit({ 
                            animation: { 
                                duration: 250, 
                                easingFunction: 'easeInOutQuad' 
                            } 
                        });
                    } else {
                        idEscolhido = parseInt(idEscolhido); // Converte o ID para número
                    
                        // A "mágica" do Vis.js: move a câmara e dá zoom no nó selecionado
                        network.focus(idEscolhido, {
                            scale: 1.2, // Nível de zoom (1.0 é o tamanho real, valores maiores aproximam mais)
                            animation: {
                                duration: 1000,          // Duração do movimento (1000ms = 1 segundo)
                                easingFunction: 'easeInOutQuad' // Faz o movimento começar suave, acelerar e desacelerar no fim
                            }
                        });
                    }
                });



                

            })
            .catch(error => console.error("Erro ao carregar os dados:", error));
    </script>
</body>
</html>
